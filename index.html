<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMON'S STRATEGY AI - PRO</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d4ff; --dark: #010105; }
        body { background-color: var(--dark); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; overflow: hidden; }
        
        #login-screen { background: rgba(5, 5, 15, 0.98); padding: 30px; border-radius: 20px; width: 300px; border: 1.5px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); transition: 0.5s; }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; box-shadow: 0 0 15px var(--gold); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
        .login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }

        #main-app { display: none; text-align: center; width: 330px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .ai-card { background: rgba(10, 10, 25, 0.95); border-radius: 35px; padding: 25px; border: 2px solid var(--sky); box-shadow: 0 0 45px rgba(0, 212, 255, 0.3); position: relative; }
        
        .ai-orb { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, var(--sky), #007791, #000); margin: 15px auto; box-shadow: 0 0 35px var(--sky); animation: pulse 2s infinite ease-in-out; cursor: pointer; border: 3px solid rgba(255,255,255,0.3); transition: 0.3s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.4); } }

        .listening-active { border: 4px solid #ff4757 !important; box-shadow: 0 0 50px #ff4757 !important; animation: shake 0.2s infinite !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }

        #signal-text { font-size: 26px; font-weight: bold; margin: 15px 0; min-height: 38px; letter-spacing: 1px; }
        .up { color: #00ff88; text-shadow: 0 0 15px #00ff88; }
        .down { color: #ff3e3e; text-shadow: 0 0 15px #ff3e3e; }
        .analyzing { font-size: 14px; color: var(--sky); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; background: #000; color: #fff; border: 1px solid var(--sky); font-size: 13px; outline: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .small-btn { background: rgba(0, 212, 255, 0.1); border: 1.5px solid var(--sky); color: var(--sky); padding: 10px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="1000008884.jpg" class="logo" alt="Sumon Strategy">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:15px; font-size: 20px;">SUMON'S STRATEGY</div>
        <input type="text" id="uname" placeholder="ইউজার নাম">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <button class="login-btn" onclick="checkAuth()">ACTIVATE AI SYSTEM</button>
    </div>

    <div id="main-app">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:12px; font-size: 13px; letter-spacing: 2px;">SUMON STRATEGY AI PRO</div>
        <div class="ai-card">
            <div class="ai-orb" id="ai-orb" onclick="askUser()"></div>
            <div id="market-display" style="color:#777; font-size:12px; margin-top: 5px;">বল এ ক্লিক করে কথা বলুন</div>
            
            <div id="signal-text">SYSTEM READY</div>
            
            <select id="market-list" onchange="marketChange()">
                <option value="">-- মার্কেট বেছে নিন --</option>
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                <option value="GOLD (OTC)">GOLD (OTC)</option>
                <option value="CRYPTO IDX">CRYPTO IDX</option>
                <option value="BITCOIN">BITCOIN</option>
            </select>

            <select id="time-list">
                <option value="1">1 Minute Signal</option>
                <option value="2">2 Minutes Signal</option>
                <option value="5">5 Minutes Signal</option>
            </select>

            <div class="btn-group">
                <button class="small-btn" onclick="guide('withdraw')">টাকা তোলা</button>
                <button class="small-btn" onclick="guide('deposit')">ডিপোজিট গাইড</button>
                <button class="small-btn" style="grid-column: span 2; border-color: var(--gold); color: var(--gold);" onclick="guide('profit')">মানি ম্যানেজমেন্ট ও প্রফিট</button>
            </div>
            
            <button class="login-btn" onclick="generateSignal()">GET REAL-TIME SIGNAL</button>
        </div>
    </div>

    <script>
        const secret = "Suman With 007@";
        let tradeCount = 0;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if(recognition) {
            recognition.lang = 'bn-BD';
            recognition.continuous = false;
        }

        function speak(msg) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(msg);
            s.lang = 'bn-BD';
            s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function checkAuth() {
            const p = document.getElementById('pass').value;
            const u = document.getElementById('uname').value;
            if(p === secret && u !== "") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                speak("স্বাগতম " + u + " ভাই। আমি সুমন ভাইয়ের তৈরি এআই। আমি আপনার কথা শুনতে এবং সিগন্যাল দিতে প্রস্তুত।");
            } else {
                speak("ভুল পাসওয়ার্ড দিয়েছেন।");
            }
        }

        function marketChange() {
            const m = document.getElementById('market-list').value;
            speak(m + " মার্কেট এনালাইসিস করার জন্য সেট করা হয়েছে।");
        }

        function generateSignal() {
            const m = document.getElementById('market-list').value;
            if(!m) { speak("আগে একটি মার্কেট সিলেক্ট করুন।"); return; }
            
            document.getElementById('signal-text').innerHTML = '<span class="analyzing">ANALYZING...</span>';
            speak("সুমন এআই ডাটা এনালাইসিস করছে।");

            setTimeout(() => {
                tradeCount++;
                const isUp = Math.random() > 0.5;
                const res = isUp ? "UP ⬆️" : "DOWN ⬇️";
                document.getElementById('signal-text').innerHTML = isUp ? `<span class="up">${res}</span>` : `<span class="down">${res}</span>`;
                
                let msg = isUp ? "পরবর্তী ক্যান্ডেল উপরে যাবে। ট্রেড নিন।" : "পরবর্তী ক্যান্ডেল নিচে যাবে। ট্রেড নিন।";
                
                // ২ ট্রেড পর পর প্রমোশন
                if(tradeCount % 2 === 0) {
                    msg += " আর বন্ধুরা, তোমরাও যদি এরকম প্রফিট করতে চাও, তাহলে সুমনের টেলিগ্রামে জয়েন করো। ওখানে সব সিগন্যাল ফ্রিতে দেওয়া হয়।";
                }
                speak(msg);
            }, 3000);
        }

        function askUser() {
            if(!recognition) { speak("ভয়েস সিস্টেম সাপোর্ট করছে না।"); return; }
            recognition.start();
            document.getElementById('ai-orb').classList.add('listening-active');
            document.getElementById('market-display').innerText = "আমি শুনছি... বলুন";
        }

        if(recognition) {
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('market-display').innerText = "আপনি বলেছেন: " + text;
                
                if(text.includes("কেমন আছো")) {
                    speak("আমি ভালো আছি সুমন ভাই, আপনি কেমন আছেন? ট্রেডিং কেমন চলছে?");
                } else if(text.includes("সিগন্যাল দাও")) {
                    generateSignal();
                } else if(text.includes("টেলিগ্রাম")) {
                    speak("সুমন ভাইয়ের টেলিগ্রাম চ্যানেলে জয়েন করলে আপনি প্রতিদিন ১০০ ভাগ নির্ভুল সিগন্যাল পাবেন।");
                } else {
                    speak("আপনি বলেছেন " + text + "। সুমন ভাইয়ের এই এআই আপনার সব কথা বুঝতে পারে।");
                }
            };
            recognition.onend = () => {
                document.getElementById('ai-orb').classList.remove('listening-active');
            };
        }

        function guide(type) {
            if(type === 'withdraw') speak("টাকা তোলার জন্য বাইন্যান্স ব্যবহার করুন। এটি দ্রুত এবং নিরাপদ।");
            if(type === 'deposit') speak("ডিপোজিট করার সময় সুমন ভাইয়ের প্রোমো কোড ব্যবহার করলে বোনাস পাবেন।");
            if(type === 'profit') speak("প্রফিট করতে হলে প্রতিদিনের টার্গেট ফিক্স করুন। ৩টি উইন হলে ট্রেড বন্ধ করে দিন।");
        }
    </script>
</body>
</html>
